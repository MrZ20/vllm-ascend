name: pre-commit

on:
    workflow_call:
      inputs:
        vllm:
          required: true
          type: string

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: linux-amd64-cpu-8-hk
    steps:
    - name: Checkout vllm-project/vllm-ascend repo
      uses: actions/checkout@v6

    # Keep matchers in a temp path so they remain stable when lint commands run via docker.
    - name: cp problem matchers
      run: |
        cp .github/workflows/matchers/actionlint.json "$RUNNER_TEMP/actionlint.json"
        cp .github/workflows/matchers/markdownlint.json "$RUNNER_TEMP/markdownlint.json"
        cp .github/workflows/matchers/mypy.json "$RUNNER_TEMP/mypy.json"

    - run: echo "::add-matcher::$RUNNER_TEMP/actionlint.json"
    - run: echo "::add-matcher::$RUNNER_TEMP/markdownlint.json"
    - run: echo "::add-matcher::$RUNNER_TEMP/mypy.json"

    - name: Checkout vllm-project/vllm repo
      uses: actions/checkout@v6
      with:
        repository: vllm-project/vllm
        path: ./vllm-empty
        ref: ${{ inputs.vllm }}

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          lint_tracker:
            - '.github/workflows/dockerfiles/Dockerfile.lint'
            - 'requirements.txt'
            - 'requirements-dev.txt'
            - 'requirements-lint.txt'

    - name: Select lint image
      id: lint-image
      run: |
        if [ "${{ steps.filter.outputs.lint_tracker }}" = "true" ]; then
          echo "image=vllm-ascend-lint:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
        else
          echo "image=quay.io/ascend-ci/vllm-ascend:lint" >> "$GITHUB_OUTPUT"
        fi

    - name: Build lint image for this PR
      if: steps.filter.outputs.lint_tracker == 'true'
      run: |
        docker build \
          -t "${{ steps.lint-image.outputs.image }}" \
          -f .github/workflows/dockerfiles/Dockerfile.lint \
          .

    - name: Run pre-commit
      env:
        PRE_COMMIT_COLOR: always
        FORCE_COLOR: "1"
        TERM: xterm-256color
        SHELLCHECK_OPTS: "--exclude=SC2046,SC2006,SC2086" # Exclude SC2046, SC2006, SC2086 for actionlint
      run: |
        docker run --rm \
          --workdir /work \
          -v "$GITHUB_WORKSPACE:/work" \
          -e PRE_COMMIT_COLOR \
          -e FORCE_COLOR \
          -e TERM \
          -e SHELLCHECK_OPTS \
          "${{ steps.lint-image.outputs.image }}" \
          bash -lc '
            git config --global --add safe.directory /work
            pre-commit run --all-files --hook-stage manual --show-diff-on-failure
          '

    - name: Run mypy
      run: |
        docker run --rm \
          --workdir /work \
          -v "$GITHUB_WORKSPACE:/work" \
          "${{ steps.lint-image.outputs.image }}" \
          bash -lc '
            PYTHONPATH="$PYTHONPATH:/work/vllm-empty"
            export PYTHONPATH
            git config --global --add safe.directory /work
            # Run mypy for Python 3.10, 3.11, 3.12 manually
            # Note: We are now separating mypy from pre-commit hooks for performance reasons.
            for python_version in "3.10" "3.11" "3.12"; do
              echo "============================"
              tools/mypy.sh 1 "$python_version"
              echo "============================"
            done
          '
