#
# Central scheduling configuration for periodic CI tests.
#
# To add a new test:
#   1. Place the YAML config (or .py file / directory) under tests/e2e/schedule/.
#   2. Register its path below in the relevant schedule section.
#
# All entries must be plain path strings. Do not add chip, npu_num, runner,
# framework, route, or extra_components. These are inferred from the path by
# parse_schedule_config.py. Multi-node test entry selection is handled by the
# workflow/run.sh layer; external DP filenames must contain external_dp.
#
# Directory layout rules (framework is always the 4th path segment):
#   tests/e2e/schedule/model/<Family>/<resource_dir>/*.yaml       -> model tests
#   tests/e2e/schedule/accuracy/<resource_dir>/*.yaml             -> accuracy tests
#   tests/e2e/schedule/ops/<resource_dir>/*.py                    -> ops tests
#   tests/e2e/schedule/ops/<resource_dir>/                        -> ops tests
#
# Supported resource directories:
#   one_card, two_card, four_card, eight_card, one_node, two_node, four_node
#
# Chip is auto-detected from filename (a2/A2 token -> a2, 310p token -> 310p,
# else a3). Accuracy configs default to A2 when the filename does not include
# an explicit chip.
# External DP: filename stem must contain external_dp -> external_dp routing.

periodic_tests:

  # =========================================================================
  # nightly-main (runs every day at 23:45 Beijing time = 15:45 UTC)
  # =========================================================================
  - group: nightly-main
    cron: "45 15 * * *"
