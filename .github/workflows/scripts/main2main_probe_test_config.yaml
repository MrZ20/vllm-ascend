# Temporary main2main probe config.
#
# Keep CPU UTs enabled by default, and let --changed-files choose the
# NPU/E2E tests explicitly passed by the workflow.

- name: default_cpu_ut
  optional: false
  cpu_only: true
  tests:
    - tests/ut

---
runner_mapping:
  tests/e2e/pull_request/one_card:
    default: a2_x1
    310p: 310p_x1
  tests/e2e/pull_request/two_card:
    default: a3_x2
  tests/e2e/pull_request/four_card:
    default: a3_x4
    310p: 310p_x4
  tests/ut/.+/a3_2:
    default: a3_x2
  tests/ut/.+/a2:
    default: a2_x1

partition:
  310p_x1: 1
  310p_x4: 1
  a2_x1: 2
  a3_x2: 2
  a3_x4: 2
  cpu_x0: 1

