name: 'Cache csrc Build Directory'

# Caches are readable by PRs only when created on the default branch, so this
# workflow must run on refs/heads/main (push/schedule/dispatch). Never add a
# pull_request trigger: caches saved from a PR merge ref are invisible to every
# other PR and only consume the shared 10GB quota.
on:
  push:
    branches:
      - main
    paths:
      - 'csrc/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'setup.py'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements-dev.txt'
  schedule:
    # UTC+8: 2am every day
    - cron: '0 18 * * *'
  workflow_dispatch:

# actions: write is required by the prune step to delete superseded caches.
permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: bash -el {0}

concurrency:
  group: ascend-csrc-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_INDEX_URL: http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
  UV_EXTRA_INDEX_URL: "https://repo.huaweicloud.com/ascend/repos/pypi http://cache-service.nginx-pypi-cache.svc.cluster.local/whl/cpu"
  UV_INDEX_STRATEGY: unsafe-best-match
  UV_INSECURE_HOST: cache-service.nginx-pypi-cache.svc.cluster.local
  UV_HTTP_TIMEOUT: 120
  UV_NO_CACHE: 1
  UV_SYSTEM_PYTHON: 1
  # CI-internal CANN image registry mirror — this is infrastructure configuration,
  # not a per-image dependency. All consumers use the same registry prefix.
  IMAGE_REGISTRY: swr.cn-southwest-2.myhuaweicloud.com/base_image/ascend-ci/cann

jobs:
  # -------------------------------------------------------------------------
  # Job 1: dynamically build the matrix from Dockerfiles
  # -------------------------------------------------------------------------
  setup-matrix:
    name: Setup build matrix
    runs-on: linux-aarch64-a2b3-0
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate build matrix from Dockerfiles
        id: generate
        run: |
          python -m pip install pyyaml

          if [[ "${{ github.event_name }}" == "push" ]]; then
            matrix=$(python .github/workflows/scripts/generate_cache_matrix.py --branch-filter "${GITHUB_REF_NAME}")
          else
            matrix=$(python .github/workflows/scripts/generate_cache_matrix.py)
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Job 2: build csrc cache for all branches × dockerfiles × archs
  # -------------------------------------------------------------------------
  build-cache:
    name: ${{ matrix.branch_normalized }}-${{ matrix.dockerfile }}-${{ matrix.arch }}
    needs: setup-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - name: Config mirrors (ubuntu)
        if: matrix.os_type == 'ubuntu'
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@cache-service.nginx-pypi-cache.svc.cluster.local:8081@g' /etc/apt/sources.list
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          apt-get update -y
          apt-get install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Config mirrors (openeuler)
        if: matrix.os_type == 'openeuler'
        run: |
          pip config set global.index-url http://cache-service.nginx-pypi-cache.svc.cluster.local/pypi/simple
          pip config set global.trusted-host cache-service.nginx-pypi-cache.svc.cluster.local
          sed -Ei 's@https?://[^/]+/(openeuler|centos|fedora)@http://cache-service.nginx-pypi-cache.svc.cluster.local:8081/\1@g' /etc/yum.repos.d/*.repo
          yum install -y git zstd
          git config --global --add safe.directory /__w/vllm-ascend/vllm-ascend

      - name: Compute csrc build cache key
        id: cache_key
        shell: bash
        run: |
          # Hash of every input that affects the csrc build output, captured once
          # here on the clean checkout: csrc/build and csrc/third_party are
          # populated by the build, so re-evaluating hashFiles at save time would
          # poison the key. The pinned native deps (torch/torch-npu/triton-ascend)
          # live in requirements.txt and are covered by the hash.
          csrc_hash="${{ hashFiles('csrc/**', 'cmake/**', 'CMakeLists.txt', 'setup.py', 'pyproject.toml', 'requirements.txt', 'requirements-dev.txt') }}"
          if [ -z "$csrc_hash" ]; then
            echo "::error::hashFiles produced an empty csrc hash"
            exit 1
          fi

          cann_fp=$(bash .github/workflows/scripts/cann_fingerprint.sh)

          prefix="vllm-ascend-build-ninja-v2-${{ matrix.branch_normalized }}-${{ runner.os }}-${{ matrix.arch }}-${{ env.IMAGE_REGISTRY }}:${{ matrix.image_tag }}-"
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"
          echo "key=${prefix}cann${cann_fp}-${csrc_hash}" >> "$GITHUB_OUTPUT"

      - name: Check for existing csrc build cache
        id: lookup-csrc-build-cache
        uses: runs-on/cache/restore@v5
        with:
          path: |
            csrc/build
            csrc/third_party
          key: ${{ steps.cache_key.outputs.key }}
          lookup-only: true

      - name: Install system dependencies (ubuntu)
        if: matrix.os_type == 'ubuntu' && steps.lookup-csrc-build-cache.outputs.cache-hit != 'true'
        run: |
          apt-get -y install `cat packages.txt`
          apt-get -y install gcc g++ cmake libnuma-dev zstd clang-15 ninja-build
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 20
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-15 20
          pip install uv

      - name: Install system dependencies (openeuler)
        if: matrix.os_type == 'openeuler' && steps.lookup-csrc-build-cache.outputs.cache-hit != 'true'
        run: |
          yum install -y python3-pip git vim wget net-tools gcc gcc-c++ make cmake numactl numactl-devel jemalloc patch
          pip install uv

      - name: Install vllm-ascend (clean build)
        if: steps.lookup-csrc-build-cache.outputs.cache-hit != 'true'
        env:
          SOC_VERSION: ${{ matrix.soc_version }}
          MAX_JOBS: "16"
        run: |
          set -x
          source /usr/local/Ascend/ascend-toolkit/set_env.sh
          source /usr/local/Ascend/nnal/atb/set_env.sh

          arch=$(uname -i)
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:/usr/local/Ascend/ascend-toolkit/latest/${arch}-linux/devlib
          pip install uc-manager
          # NOTE: indexes (ascend repo for triton-ascend + pytorch cpu whl) come from
          # UV_EXTRA_INDEX_URL. Do not pass --extra-index-url on the CLI here: it overrides
          # (does not append to) the env var and would drop the ascend repo.
          uv pip install -r requirements-dev.txt
          uv pip install --force-reinstall --no-deps triton-ascend==3.2.1
          # Published caches must be ground-truth builds: never build incrementally
          # on top of an older tree, or consumers inherit any stale objects it hides.
          rm -rf csrc/build csrc/third_party
          uv pip install -e . --no-build-isolation

      - name: Save vllm-ascend csrc build cache
        if: success() && steps.lookup-csrc-build-cache.outputs.cache-hit != 'true'
        uses: runs-on/cache/save@v5
        with:
          path: |
            csrc/build
            csrc/third_party
          key: ${{ steps.cache_key.outputs.key }}

      - name: Prune superseded csrc build caches
        if: success() && steps.lookup-csrc-build-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          CACHE_KEY_PREFIX: ${{ steps.cache_key.outputs.prefix }}
          CACHE_KEY_CURRENT: ${{ steps.cache_key.outputs.key }}
        run: |
          PY=$(command -v python3 || command -v python || true)
          if [ -z "$PY" ]; then
            echo "python not available in this image; skipping cache prune"
            exit 0
          fi
          "$PY" .github/workflows/scripts/prune_csrc_caches.py
